<!DOCTYPE html>

<html>
    <head>
        <title>Aula5 Cadastro</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/style.css"/>
        <link rel="icon" href="img/cri.png"/>
        
    </head>
    <body>
        <!--cabeçalho-->
        <header>
            <nav>
               <div> 
                   <a href="index.html">
                       <img src="img/cri.png" alt="logo do site" id="logo"/>
                   </a> 
               </div>
                
                <div> 
                   <a href="index.html">
                       <img src="img/menu.png" alt="menu do site" id="menu"/>
                   </a> 
               </div>
            </nav> 
        </header>
        
        
        <!--corpo-->
        <main>
            <h1 id="cad">Cadastro</h1>
            <form action="#" method="get">
                <div>
                    <label for="nome">Nome:</label> 
                    <input type="text"  id="nome" name="nome" placeholder="nome..."  minlength="10" required>
                </div>
                
                <div>
                    <label for="cpf">CPF:</label> 
                    <input type="tel" pattern="[0-9]{3}.[0-9]{3}.[0-9]{3}-[0-9]{2}" id="cpf" name="cpf" placeholder=" Ex: 000.000.000-00" minlength="14" required>
                </div>
                
                <div>
                    <label for="telefone">Telefone:</label> 
                    <input type="tel" pattern="[0-9]{2}-[0-9]{5}.[0-9]{4}" id="telefone" name="telefone" minlength="13" placeholder=" 12-12345.1234">
                </div>
                  
                <div>
                    <label for="email">E-mail:</label> 
                    <input type="email"  id="email" name="email" placeholder="email@gmail/hotmail.com">
                </div>
                
                <div>
                    <label for="data-nasc">Data de Nascimento:</label> 
                    <input type="date"  id="data-nasc" name="data-nasc">
                </div>
                 
                <div>
                    <label for="senha">Senha:</label> 
                    <input type="password"  id="senha" name="senha" placeholder="*********" minlength="6" required>
                </div>
                 
                <div>
                    <label for="rept-senha">Repita a senha:</label> 
                    <input type="password"  id="rept-senha" name="rept-senha" placeholder="**********" minlength="6" required>
                </div>
                 
                <div>
                    <input type="checkbox"  id="avisos" name="avisos" checked>
                    <label for="avisos">Deseja receber avisos?</label>                    
                </div>
                
                <div> 
                    <input type="submit"  id="btn-cadastrar" value="CADASTRAR">
                </div>
                
            </form>
        </main>
        
        
        <!--rodapé-->
        <footer>
            
        </footer>
        
        <small>
            &COPY; 2026 - nenhum direito reservavdo
        </small>
    </body>
</html>
